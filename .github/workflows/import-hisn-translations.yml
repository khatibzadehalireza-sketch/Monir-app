name: Import Hisn al-Muslim Translations

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      # ── Step 1: verify translation columns exist ───────────────────────────
      - name: Check translation columns
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'SCRIPT'
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

          const MIGRATION_SQL = `-- Run once in the Supabase SQL editor:
          ALTER TABLE library_duas
            ADD COLUMN IF NOT EXISTS english_text  text,
            ADD COLUMN IF NOT EXISTS turkish_text  text,
            ADD COLUMN IF NOT EXISTS urdu_text     text,
            ADD COLUMN IF NOT EXISTS french_text   text,
            ADD COLUMN IF NOT EXISTS bengali_text  text;`;

          console.log('Required migration SQL (run once if not done yet):');
          console.log('─'.repeat(60));
          console.log(MIGRATION_SQL);
          console.log('─'.repeat(60) + '\n');

          const res = await fetch(
            `${SUPABASE_URL}/rest/v1/library_duas?select=english_text,turkish_text,urdu_text,french_text,bengali_text&limit=0`,
            { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
          );

          if (!res.ok) {
            const body = await res.text();
            console.error(`One or more translation columns are missing (HTTP ${res.status}).`);
            console.error('Run the migration SQL above in your Supabase dashboard first.');
            console.error(`Detail: ${body}`);
            process.exit(1);
          }

          console.log('All translation columns confirmed ✓');
          SCRIPT

      # ── Step 2: fetch + match + update ────────────────────────────────────
      - name: Import translations from hadeethenc.com
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'SCRIPT'
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;
          const BASE = 'https://hadeethenc.com/api/v1';
          // NOTE: hadeeths/list without category_id returns 404 — iterate all
          // categories instead, which is how the API is designed to be used.
          const DELAY_MS = 150;
          const LANGS = ['en', 'tr', 'ur', 'fr', 'bn'];

          function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

          function normalize(text) {
            if (!text) return '';
            return text.trim()
              .replace(/\s+/g, ' ')
              .replace(/[​-‍﻿­]/g, '');
          }

          async function fetchJson(url) {
            try {
              const res = await fetch(url);
              if (!res.ok) return null;
              const text = await res.text();
              if (!text || text === '""') return null;
              return JSON.parse(text);
            } catch { return null; }
          }

          // ── Load full library_duas index ──────────────────────────────────
          async function loadDuasIndex() {
            const index = new Map(); // normalized arabic_text → {category_id, dua_number}
            let offset = 0;
            const PAGE = 1000;
            while (true) {
              const res = await fetch(
                `${SUPABASE_URL}/rest/v1/library_duas?select=arabic_text,category_id,dua_number&limit=${PAGE}&offset=${offset}`,
                { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
              );
              if (!res.ok) throw new Error(`Failed loading duas index: HTTP ${res.status}`);
              const rows = await res.json();
              if (!rows.length) break;
              for (const row of rows) {
                const key = normalize(row.arabic_text);
                if (key) index.set(key, { category_id: row.category_id, dua_number: row.dua_number });
              }
              offset += rows.length;
              if (rows.length < PAGE) break;
            }
            return index;
          }

          // ── Collect all hadith IDs by iterating every root category ───────
          async function collectAllIds() {
            const ids = new Set();

            const roots = await fetchJson(`${BASE}/categories/roots/?language=en`);
            await delay(DELAY_MS);
            if (!roots?.length) throw new Error('Could not fetch root categories');
            console.log(`  ${roots.length} root categories found.`);

            for (const cat of roots) {
              let page = 1;
              while (true) {
                const data = await fetchJson(
                  `${BASE}/hadeeths/list/?language=en&category_id=${cat.id}&page=${page}&per_page=100`
                );
                await delay(DELAY_MS);
                if (!data?.data?.length) break;
                for (const h of data.data) ids.add(h.id);
                if (page >= (data.meta?.last_page ?? page)) break;
                page++;
              }
            }
            return [...ids];
          }

          // ── PATCH a single row using safe integer filters ─────────────────
          async function patchRow(categoryId, duaNumber, translations) {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/library_duas?category_id=eq.${categoryId}&dua_number=eq.${duaNumber}`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Prefer': 'return=minimal',
                },
                body: JSON.stringify(translations),
              }
            );
            if (!res.ok) throw new Error(`PATCH failed (HTTP ${res.status}): ${await res.text()}`);
          }

          async function main() {
            console.log('=== Import Hisn al-Muslim translations — hadeethenc.com ===\n');

            // Step 1: Load existing duas
            console.log('Step 1: Loading library_duas index...');
            const duasIndex = await loadDuasIndex();
            console.log(`  ${duasIndex.size} rows indexed.\n`);

            // Step 2: Collect all hadith IDs
            console.log('Step 2: Collecting hadith IDs from hadeethenc.com...');
            const allIds = await collectAllIds();
            console.log(`  ${allIds.length} unique IDs collected.\n`);

            // Step 3: Fetch translations, match, and update
            console.log('Step 3: Fetching translations and updating library_duas...');
            let matched = 0;
            let noMatch = 0;
            let errors = 0;

            for (let i = 0; i < allIds.length; i++) {
              const id = allIds[i];

              // Fetch all 5 non-Arabic languages in parallel.
              // Every response also includes hadeeth_ar (Arabic), so no
              // separate Arabic call is needed.
              const results = await Promise.all(
                LANGS.map(lang => fetchJson(`${BASE}/hadeeths/one/?language=${lang}&id=${id}`))
              );
              await delay(DELAY_MS);

              const byLang = Object.fromEntries(LANGS.map((l, i) => [l, results[i]]));
              const arabicText = byLang['en']?.hadeeth_ar?.trim();
              if (!arabicText) { noMatch++; continue; }

              const rowKey = duasIndex.get(normalize(arabicText));
              if (!rowKey) { noMatch++; continue; }

              try {
                await patchRow(rowKey.category_id, rowKey.dua_number, {
                  english_text: byLang['en']?.hadeeth?.trim() || null,
                  turkish_text: byLang['tr']?.hadeeth?.trim() || null,
                  urdu_text:    byLang['ur']?.hadeeth?.trim() || null,
                  french_text:  byLang['fr']?.hadeeth?.trim() || null,
                  bengali_text: byLang['bn']?.hadeeth?.trim() || null,
                });
                matched++;
              } catch (err) {
                console.error(`  [error] id=${id}: ${err.message}`);
                errors++;
              }

              if ((i + 1) % 100 === 0) {
                console.log(`  [${i + 1}/${allIds.length}] matched=${matched} no-match=${noMatch} errors=${errors}`);
              }
            }

            console.log(`\nDone.`);
            console.log(`  IDs processed : ${allIds.length}`);
            console.log(`  Rows updated  : ${matched}`);
            console.log(`  No match      : ${noMatch}`);
            if (errors) console.log(`  Errors        : ${errors}`);
          }

          main().catch(err => { console.error('Fatal:', err.message); process.exit(1); });
          SCRIPT
