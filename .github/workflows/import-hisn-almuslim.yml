name: Import Hisn al-Muslim

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Import Hisn al-Muslim into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'SCRIPT'
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

          if (!SUPABASE_URL || !SUPABASE_KEY) {
            console.error('Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY');
            process.exit(1);
          }

          // Note: /json/ subfolder does not exist in this repo — file is at root.
          const SOURCE_URL = 'https://raw.githubusercontent.com/rn0x/hisn_almuslim_json/main/hisn_almuslim.json';
          const BATCH_SIZE = 200;

          async function upsertBatch(rows) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/library_duas`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Prefer': 'resolution=merge-duplicates',
              },
              body: JSON.stringify(rows),
            });
            if (!res.ok) {
              const text = await res.text();
              throw new Error(`Supabase upsert failed (HTTP ${res.status}): ${text}`);
            }
          }

          async function main() {
            console.log('=== Import Hisn al-Muslim (rn0x/hisn_almuslim_json) ===\n');

            console.log('Fetching source JSON...');
            const res = await fetch(SOURCE_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status} fetching source`);
            const data = await res.json();

            const categories = Object.keys(data);
            console.log(`${categories.length} categories found.\n`);

            const allRows = [];

            for (let catIdx = 0; catIdx < categories.length; catIdx++) {
              const categoryNameArabic = categories[catIdx];
              const categoryId = catIdx + 1;
              const entry = data[categoryNameArabic];

              // text is an array of dua strings
              const texts = Array.isArray(entry?.text) ? entry.text : [];

              for (let duaIdx = 0; duaIdx < texts.length; duaIdx++) {
                const arabic = texts[duaIdx]?.trim();
                if (!arabic) continue;
                allRows.push({
                  category_id: categoryId,
                  category_name_arabic: categoryNameArabic,
                  category_name_english: null,   // not available in this dataset
                  dua_number: duaIdx + 1,
                  arabic_text: arabic,
                  english_text: null,            // not available in this dataset
                });
              }

              console.log(`Category ${categoryId} (${categoryNameArabic}): ${texts.length} duas`);
            }

            console.log(`\nTotal rows: ${allRows.length}`);
            console.log(`Upserting in batches of ${BATCH_SIZE}...`);

            let upserted = 0;
            for (let i = 0; i < allRows.length; i += BATCH_SIZE) {
              await upsertBatch(allRows.slice(i, i + BATCH_SIZE));
              upserted += Math.min(BATCH_SIZE, allRows.length - i);
              console.log(`  ${upserted}/${allRows.length} rows upserted`);
            }

            console.log(`\nDone. ${upserted} rows inserted/updated.`);
          }

          main().catch(err => { console.error('Fatal:', err.message); process.exit(1); });
          SCRIPT
