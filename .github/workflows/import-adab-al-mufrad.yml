name: Import Al-Adab Al-Mufrad

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Import Al-Adab Al-Mufrad into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'SCRIPT'
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

          if (!SUPABASE_URL || !SUPABASE_KEY) {
            console.error('Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY');
            process.exit(1);
          }

          const CDN_URL = 'https://cdn.jsdelivr.net/gh/AhmedBaset/hadith-json@v1.2.0/db/other_books/aladab_almufrad.json';
          const COLLECTION_KEY = 'adab_al_mufrad';
          const BATCH_SIZE = 200;

          async function fetchJson(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status} from ${url}`);
            return res.json();
          }

          async function upsertBatch(rows) {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/library_hadiths?on_conflict=collection_key,hadith_number`,
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Prefer': 'resolution=merge-duplicates',
                },
                body: JSON.stringify(rows),
              }
            );
            if (!res.ok) {
              const text = await res.text();
              throw new Error(`Supabase upsert failed (HTTP ${res.status}): ${text}`);
            }
          }

          async function main() {
            console.log('=== Import Al-Adab Al-Mufrad (AhmedBaset/hadith-json v1.2.0) ===\n');

            console.log('Fetching Al-Adab Al-Mufrad JSON...');
            const data = await fetchJson(CDN_URL);
            console.log(`  Fetched ${data.length} items.\n`);

            const rows = [];
            let skipped = 0;

            for (const item of data) {
              const arabic = item.arabic?.trim();
              if (!item.id || !arabic) { skipped++; continue; }

              rows.push({
                collection_key: COLLECTION_KEY,
                hadith_number:  item.id,
                book_number:    item.bookId ?? null,
                chapter_number: item.chapterId ?? null,
                arabic_text:    arabic,
                english_text:   item.english?.text?.trim() ?? null,
                narrator:       item.english?.narrator?.trim() ?? null,
                grade:          null,
              });
            }

            console.log(`Rows built: ${rows.length} valid, ${skipped} skipped.\n`);
            console.log(`Upserting in batches of ${BATCH_SIZE}...`);

            let upserted = 0;
            for (let i = 0; i < rows.length; i += BATCH_SIZE) {
              await upsertBatch(rows.slice(i, i + BATCH_SIZE));
              upserted += Math.min(BATCH_SIZE, rows.length - i);
              console.log(`  ${upserted}/${rows.length} rows upserted`);
            }

            console.log(`\nDone. ${upserted} rows inserted/updated.`);
          }

          main().catch(err => { console.error('Fatal:', err.message); process.exit(1); });
          SCRIPT
